apiVersion: apps/v1
kind: Deployment
metadata:
  name: compute-manager
spec:
  replicas: 2
  template:
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            control-plane: compute
