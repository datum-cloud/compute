apiVersion: apps/v1
kind: Deployment
metadata:
  name: compute-manager
  labels:
    control-plane: compute
    app.kubernetes.io/name: compute
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: compute
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: compute
        app.kubernetes.io/name: compute
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
          - --server-config=/config/config.yaml
        image: ghcr.io/datum-cloud/compute:latest
        name: manager
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts:
        - name: config
          mountPath: /config
        - name: webhook-cert
          mountPath: /tmp/k8s-webhook-server/serving-certs
          readOnly: true
      serviceAccountName: compute
      terminationGracePeriodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: compute-config
      # Optional so the manager can run without admission webhooks: when
      # `webhookServer:` is omitted from the server config, the binary
      # skips the webhook server entirely and the missing Secret is fine.
      - name: webhook-cert
        secret:
          secretName: compute-webhook-cert
          defaultMode: 420
          optional: true
