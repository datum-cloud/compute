apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# All namespaced resources land here. Override via Flux's targetNamespace
# (or by editing this overlay) to install into a different namespace.
namespace: compute-system

resources:
  - ../../base/crd
  - ../../base/manager
  - ../../base/webhook
  - ../../base/certmanager
  - ../../components/resource-metrics
components:
  - ../../components/leader_election
  - ../../components/controller_rbac

patches:
- path: webhookcainjection_patch.yaml

replacements:
# Fill in SERVICE_NAME / SERVICE_NAMESPACE placeholders in the Certificate's
# dnsNames so the cert is issued for the actual webhook Service location.
- source:
    kind: Service
    version: v1
    name: compute-webhook
    fieldPath: .metadata.name
  targets:
  - select:
      kind: Certificate
      group: cert-manager.io
      version: v1
      name: compute-serving-cert
    fieldPaths:
    - .spec.dnsNames.0
    - .spec.dnsNames.1
    options:
      delimiter: '.'
      index: 0
      create: true
- source:
    kind: Service
    version: v1
    name: compute-webhook
    fieldPath: .metadata.namespace
  targets:
  - select:
      kind: Certificate
      group: cert-manager.io
      version: v1
      name: compute-serving-cert
    fieldPaths:
    - .spec.dnsNames.0
    - .spec.dnsNames.1
    options:
      delimiter: '.'
      index: 1
      create: true
# Wire the Certificate namespace + name into the cert-manager.io/inject-ca-from
# annotation on the webhook configurations so cainjector populates caBundle.
- source:
    kind: Certificate
    group: cert-manager.io
    version: v1
    name: compute-serving-cert
    fieldPath: .metadata.namespace
  targets:
  - select:
      kind: ValidatingWebhookConfiguration
    fieldPaths:
    - .metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: '/'
      index: 0
      create: true
  - select:
      kind: MutatingWebhookConfiguration
    fieldPaths:
    - .metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: '/'
      index: 0
      create: true
- source:
    kind: Certificate
    group: cert-manager.io
    version: v1
    name: compute-serving-cert
    fieldPath: .metadata.name
  targets:
  - select:
      kind: ValidatingWebhookConfiguration
    fieldPaths:
    - .metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: '/'
      index: 1
      create: true
  - select:
      kind: MutatingWebhookConfiguration
    fieldPaths:
    - .metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: '/'
      index: 1
      create: true
